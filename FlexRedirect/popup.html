<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark light">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self'; object-src 'self'">
  <style>
    @property --vortex-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    :root { color-scheme: dark; }

    body {
      /* Default = Black Flat */
      --popup-bg: #0a0a0a;
      --popup-text: #ccc;
      --btn-bg: rgba(255,255,255,0.06);
      --btn-border: rgba(255,255,255,0.1);
      --btn-hover-bg: rgba(255,255,255,0.12);
      --btn-hover-border: rgba(255,255,255,0.2);
      --ws-font-color: rgba(255,255,255,0.85);
      --ws-active-bg: rgba(74,222,128,0.08);
      --ws-active-border: rgba(74,222,128,0.4);
      --ws-active-color: #4ade80;
      --ws-active-glow: rgba(74,222,128,0.15);
      --label-color: rgba(255,255,255,0.35);
      --settings-color: rgba(255,255,255,0.35);
      --toggle-bg: rgba(255,255,255,0.15);
      --toggle-active: linear-gradient(135deg,#7c3aed 0%,#3b82f6 100%);
      --confirm-bg: rgba(74,222,128,0.08);
      --confirm-border: rgba(74,222,128,0.3);
      --confirm-glow: rgba(74,222,128,0.1);
      --neo-shadow: none;
      --neo-shadow-hover: none;
      --neo-inset: none;
      --neo-active-shadow: 0 0 12px rgba(74,222,128,0.15);

      background: var(--popup-bg);
      color: var(--popup-text);
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      width: 240px; padding: 10px 16px; margin: 0;
      display: flex; flex-direction: column; gap: 8px;
      transition: all 0.35s ease;
      box-sizing: border-box;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes vortexSpin { to { --vortex-angle: 360deg; } }
    @keyframes suctionBreath { 0%,100%{transform:scale(1)} 50%{transform:scale(0.94)} }
    @keyframes suctionRipple { 0%{transform:scale(1.4);opacity:0} 40%{opacity:0.6} 100%{transform:scale(0.5);opacity:0} }
    @keyframes letterPulse { 0%,100%{text-shadow:0 0 8px var(--ws-active-color),0 0 20px var(--ws-active-color)} 50%{text-shadow:0 0 18px var(--ws-active-color),0 0 40px var(--ws-active-color)} }
    @keyframes swallow { 0%{transform:scale(1)} 30%{transform:scale(0.82)} 50%{transform:scale(0.82)} 100%{transform:scale(1.06)} }
    @keyframes greenPulse { 0%{box-shadow:0 0 10px rgba(74,222,128,0.15)} 50%{box-shadow:0 0 25px rgba(74,222,128,0.4)} 100%{box-shadow:0 0 10px rgba(74,222,128,0.15)} }
    @keyframes cyanPulse { 0%{box-shadow:0 0 10px rgba(6,182,212,0.15)} 50%{box-shadow:0 0 25px rgba(6,182,212,0.4)} 100%{box-shadow:0 0 10px rgba(6,182,212,0.15)} }

    /* ===== HEADER ===== */
    h3 { margin:0; font-weight:700; font-size:11px; letter-spacing:3px; text-transform:uppercase; opacity:0.95; line-height:1; }
    .header-row { display:flex; align-items:center; justify-content:space-between; }
    .toggle-group { display:flex; align-items:center; gap:6px; }
    .toggle-label { font-size:8px; font-weight:600; color:var(--label-color); text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; }
    .toggle { position:relative; width:32px; height:14px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; cursor:pointer; inset:0; background:var(--toggle-bg); border-radius:16px; transition:0.3s; }
    .toggle-slider:before { position:absolute; content:""; height:8px; width:8px; left:3px; top:50%; transform:translateY(-50%); background:#fff; border-radius:50%; transition:0.3s; box-shadow:0 0 4px rgba(0,0,0,0.3); }
    .toggle input:checked + .toggle-slider { background:var(--toggle-active); }
    .toggle input:checked + .toggle-slider:before { transform:translateY(-50%) translateX(18px); }

    /* ===== SECTION LABEL ===== */
    .section-label { font-size:8px; font-weight:600; color:var(--label-color); text-transform:uppercase; letter-spacing:1px; text-align:center; opacity:0.6; }

    /* ===== WORKSPACE A/B/C ===== */
    .ws-grid { display:flex; justify-content:center; gap:12px; }
    .ws-btn {
      width:46px; height:46px;
      background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; position:relative; overflow:visible; z-index:1;
      box-shadow:var(--neo-shadow);
      transition:transform 0.2s,background 0.2s,border-color 0.2s,box-shadow 0.2s;
    }
    .ws-btn span { font-size:19px; font-weight:700; color:var(--ws-font-color); transition:color 0.2s,text-shadow 0.3s; position:relative; z-index:3; }
    /* Vortex border */
    .ws-btn::before { content:''; position:absolute; inset:-2px; border-radius:14px; background:conic-gradient(from var(--vortex-angle),transparent 0%,var(--ws-active-color) 8%,transparent 18%,rgba(59,130,246,0.8) 28%,transparent 38%,var(--ws-active-color) 48%,transparent 58%,rgba(59,130,246,0.8) 68%,transparent 78%,var(--ws-active-color) 88%,transparent 100%); z-index:-1; opacity:0; transition:opacity 0.4s; animation:vortexSpin 1.8s linear infinite; -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; padding:2.5px; }
    .ws-btn::after { content:''; position:absolute; inset:-8px; border-radius:20px; background:radial-gradient(circle,var(--ws-active-color) 0%,transparent 70%); z-index:-1; opacity:0; pointer-events:none; transform:scale(1.4); }
    .ws-btn:hover { transform:scale(1.05); animation:suctionBreath 1.2s ease-in-out infinite; box-shadow:var(--neo-shadow-hover); }
    .ws-btn:hover::before { opacity:1; }
    .ws-btn:hover::after { animation:suctionRipple 1s ease-in-out infinite; }
    .ws-btn:hover span { animation:letterPulse 1.5s ease-in-out infinite; }
    .ws-btn.swallowing { animation:swallow 0.45s cubic-bezier(0.36,0,0.66,-0.56) forwards !important; }
    .ws-btn.active { background:var(--ws-active-bg); border-color:var(--ws-active-border); box-shadow:var(--neo-active-shadow); }
    .ws-btn.active span { color:var(--ws-active-color); }
    .ws-btn.active::before { opacity:0 !important; }
    .ws-btn.disabled { opacity:0.25; pointer-events:none; }
    /* Neo inset overlay */
    .ws-btn > .neo-inset { position:absolute; inset:0; border-radius:inherit; box-shadow:var(--neo-inset); pointer-events:none; display:none; }

    /* ===== ACTION BUTTONS ===== */
    .actions-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .btn-action {
      height:36px; background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:10px;
      display:flex; align-items:center; justify-content:center; gap:6px;
      cursor:pointer; color:var(--popup-text); font-size:10px; font-weight:600;
      box-shadow:var(--neo-shadow);
      transition:all 0.25s cubic-bezier(0.25,0.8,0.25,1);
      outline:none; padding:0 8px; opacity:0.8; white-space:nowrap; overflow:hidden;
      position:relative;
    }
    .btn-action svg { width:13px; height:13px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
    .btn-action > .neo-inset { position:absolute; inset:0; border-radius:inherit; box-shadow:var(--neo-inset); pointer-events:none; display:none; }
    .btn-action:hover { opacity:1; background:var(--btn-hover-bg); border-color:var(--btn-hover-border); transform:translateY(-1px); box-shadow:var(--neo-shadow-hover); }
    .btn-action:active { transform:scale(0.97); }
    #openBtn:hover { animation:greenPulse 2s infinite ease-in-out; }
    #windowBtn:hover { animation:cyanPulse 2s infinite ease-in-out; }

    /* ===== CONFIRM CARD ===== */
    .confirm-card { background:var(--confirm-bg); backdrop-filter:blur(12px); border:1px solid var(--confirm-border); border-radius:10px; padding:8px 12px; display:flex; align-items:center; gap:8px; box-shadow:0 0 15px var(--confirm-glow); max-height:0; overflow:hidden; opacity:0; transition:all 0.35s cubic-bezier(0.25,0.8,0.25,1); margin-top:-10px; }
    .confirm-card.show { max-height:60px; opacity:1; margin-top:0; }
    .confirm-icon { width:18px; height:18px; border-radius:4px; flex-shrink:0; }
    .confirm-text { font-size:10px; line-height:1.3; color:var(--popup-text); opacity:0.9; }
    .ws-badge { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; background:var(--btn-bg); border:1px solid var(--ws-active-border); border-radius:4px; font-weight:700; font-size:10px; color:var(--ws-active-color); vertical-align:middle; margin-left:3px; line-height:1; box-shadow:0 0 6px var(--ws-active-glow); }

    /* ===== FOOTER ===== */
    .footer-row { display:grid; grid-template-columns:auto 1fr auto; align-items:center; margin-top:12px; }
    .footer-left { justify-self:start; }
    .footer-right { justify-self:end; }
        .btn-settings-mini { background:transparent; border:none; color:var(--settings-color); padding:4px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.3s; outline:none; width:22px; height:22px; border-radius:6px; position:relative; top:-6px; }
    .btn-settings-mini svg { width:14px; height:14px; fill:currentColor; opacity:0.5; transition:0.3s; }
    .btn-settings-mini:hover { background:rgba(255,255,255,0.05); }
    .btn-settings-mini:hover svg { opacity:1; transform:rotate(45deg); }

    /* ===== THEME SQUARES ===== */
    .theme-area { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
    .theme-squares { display:flex; gap:5px; }
    .theme-sq {
      width:18px; height:18px; border-radius:5px; cursor:pointer;
      border:2px solid rgba(255,255,255,0.08);
      transition:all 0.2s ease; opacity:0.55;
      box-shadow:0 2px 5px rgba(0,0,0,0.5); box-sizing:border-box;
    }
    .theme-sq:hover { transform:scale(1.1); opacity:1; border-color:rgba(255,255,255,0.4); }
    .theme-sq.active-sq { border-color:rgba(255,255,255,0.8); opacity:1; box-shadow:0 0 8px rgba(255,255,255,0.4); transform:scale(1.1); }
    /* Light theme adjustments */
    body.light .theme-sq.active-sq { border-color:rgba(0,0,0,0.5); box-shadow:0 0 8px rgba(0,0,0,0.15); }
    body.light .theme-sq:hover { border-color:rgba(0,0,0,0.3); }

    /* Color theme name label */
    .theme-name {
      font-size:7px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
      opacity:0; color:var(--popup-text); transition:opacity 0.3s; text-align:right;
      max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      height:10px; line-height:10px;
    }
    .theme-name.visible { opacity:0.4; }

    /* ===== NEUMORPHISM STATE ===== */
    body.neo .ws-btn > .neo-inset,
    body.neo .btn-action > .neo-inset { display:block; }
    body.neo .ws-btn { border-width:0; }
    body.neo .ws-btn.active { border-width:0; }
    body.neo .btn-action { border-color:transparent; }
  </style>
</head>
<body>
  <div class="header-row">
    <h3 data-i18n="appName">FLEX REDIRECT</h3>
    <div class="toggle-group">
      <span class="toggle-label" data-i18n="autoOpen">Auto-redirect</span>
      <label class="toggle">
        <input type="checkbox" id="toggleEnabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="section-label" data-i18n="saveTo">Add site to workspace</div>

  <div class="ws-grid">
    <div class="ws-btn" data-ws="A"><span>A</span><div class="neo-inset"></div></div>
    <div class="ws-btn" data-ws="B"><span>B</span><div class="neo-inset"></div></div>
    <div class="ws-btn" data-ws="C"><span>C</span><div class="neo-inset"></div></div>
  </div>

  <div class="confirm-card" id="confirmCard">
    <img src="" class="confirm-icon" id="confirmIcon">
    <div class="confirm-text" id="confirmText"></div>
  </div>

  <div class="actions-row">
    <button id="openBtn" class="btn-action">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-width="2.2"/></svg>
      <span data-i18n="newTab">New Tab</span>
      <div class="neo-inset"></div>
    </button>
    <button id="windowBtn" class="btn-action">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2.5"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span data-i18n="newWindow">New Window</span>
      <div class="neo-inset"></div>
    </button>
  </div>

  <div class="footer-row">
    <div class="footer-left">
      <button id="settingsBtn" class="btn-settings-mini" title="Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.04.17 0 .34.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.04-.22 0-.45-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
    </div>
    <div></div>
    <div class="footer-right">
      <div class="theme-area">
        <div class="theme-squares">
          <div class="theme-sq active-sq" data-base="black" style="background:#0a0a0a;" title="Black"></div>
          <div class="theme-sq" data-base="gray" style="background:#444;" title="Gray"></div>
          <div class="theme-sq" data-base="white" style="background:#e0e5ec;" title="White"></div>
          <div class="theme-sq" data-base="color" style="background:linear-gradient(135deg,#e11d48,#9333ea);" title="Color themes"></div>
        </div>
        <div class="theme-name" id="themeName"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
